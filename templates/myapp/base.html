{% load static %}
<!DOCTYPE html>


<html>
<head>
    <title>Ловушка для стримов</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <div class="d-flex flex-column flex-md-row align-items-center pb-3 mb-4 border-bottom">
      <a href="" class="d-flex align-items-center link-body-emphasis text-decoration-none">
        <span class="fs-4">LivestreamTrap</span>
      </a>

      <nav class="d-inline-flex mt-2 mt-md-0 ms-md-auto">
        <a class="me-3 py-2 link-body-emphasis text-decoration-none" href="{% url 'main' %}">Home page</a>
        <a class="me-3 py-2 link-body-emphasis text-decoration-none" href="{% url 'tasks' %}">Tasks</a>
        <a class="me-3 py-2 link-body-emphasis text-decoration-none" href="{% url 'downloads' %}">Downloads</a>
      </nav>
    </div>
    <h1><p style="margin-left: 120px;">Ловушка для стримов</p></h1>
    <form method="post">
        {% csrf_token %}
        <!-- {{ form.as_p }} -->
        <h3><p style="margin-left: 120px;">{% block subtitle %}{% endblock %}</p></h3>
        <br>
        <div class="container">
            {% block contents %}{% endblock %}
        </div>
    </form>
    {% if form.errors %}
        <div>
            {{ form.errors }}
        </div>
    {% endif %}
    
    {% if message %}
        <p>{{ message }}</p>
    {% endif %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
